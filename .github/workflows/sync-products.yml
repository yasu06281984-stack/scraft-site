name: Sync S-CRAFT products
on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"
permissions:
  contents: write
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node crawl.js
      - run: git config user.name scraft-bot && git config user.email actions@github.com && git add products.js && (git diff --cached --quiet || git commit -m "sync products") && git push
